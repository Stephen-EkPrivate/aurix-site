<title>Aurix — Coming Soon</title>

<style>
  :root{
    --gold-deep:#8a6d34;
    --gold:#c2a55f;
    --gold-bright:#e7d590;
    --ink:#050505;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Helvetica Neue',Arial,sans-serif;
    background:var(--ink);
    color:#cfc6b4;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
  }
  /* ambient gold glow */
  .glow{
    position:absolute;
    top:50%;left:50%;
    width:120vmax;height:120vmax;
    transform:translate(-50%,-58%);
    background:radial-gradient(circle, rgba(180,150,80,0.16) 0%, rgba(120,95,45,0.06) 30%, rgba(0,0,0,0) 62%);
    pointer-events:none;
    animation:breathe 9s ease-in-out infinite;
  }
  @keyframes breathe{0%,100%{opacity:.75;transform:translate(-50%,-58%) scale(1)}50%{opacity:1;transform:translate(-50%,-58%) scale(1.06)}}
  /* faint grid texture */
  .grid{
    position:absolute;inset:0;
    background-image:linear-gradient(rgba(255,255,255,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.022) 1px,transparent 1px);
    background-size:64px 64px;
    mask-image:radial-gradient(circle at 50% 45%,#000 0%,transparent 70%);
    -webkit-mask-image:radial-gradient(circle at 50% 45%,#000 0%,transparent 70%);
    pointer-events:none;
  }
  .wrap{
    position:relative;
    z-index:2;
    text-align:center;
    padding:32px;
    max-width:760px;
    animation:rise 1.4s cubic-bezier(.16,.84,.44,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  .logo{
    width:min(72vw,520px);
    height:auto;
    filter:drop-shadow(0 8px 40px rgba(200,168,74,0.18));
  }
  .status{
    margin-top:44px;
    display:inline-flex;
    align-items:center;
    gap:11px;
    font-size:11px;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:#b8a262;
  }
  .dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--gold-bright);
    box-shadow:0 0 10px 2px rgba(231,213,144,.6);
    animation:pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:.35;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}
  h1{
    margin-top:26px;
    font-size:clamp(22px,3.4vw,34px);
    font-weight:300;
    letter-spacing:.01em;
    color:#efe9da;
  }
  h1 .accent{
    background:linear-gradient(90deg,var(--gold-deep),var(--gold-bright),var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    font-weight:500;
  }
  p.sub{
    margin:18px auto 0;
    max-width:480px;
    font-size:15px;
    line-height:1.7;
    font-weight:300;
    color:#9d957f;
  }
  /* progress shimmer */
  .bar{
    margin:42px auto 0;
    width:min(80vw,340px);
    height:2px;
    border-radius:2px;
    background:rgba(255,255,255,0.07);
    overflow:hidden;
  }
  .bar i{
    display:block;height:100%;width:40%;
    background:linear-gradient(90deg,transparent,var(--gold),var(--gold-bright),var(--gold),transparent);
    animation:slide 2.6s ease-in-out infinite;
  }
  @keyframes slide{0%{transform:translateX(-120%)}100%{transform:translateX(320%)}}
  .foot{
    margin-top:40px;
    font-size:12px;
    letter-spacing:.14em;
    color:#6f6856;
  }
  .foot a{color:#b8a262;text-decoration:none;border-bottom:1px solid rgba(184,162,98,.3);padding-bottom:1px;transition:color .25s}
  .foot a:hover{color:var(--gold-bright)}
  @media(max-width:520px){
    .status{letter-spacing:.24em}
    p.sub{font-size:14px}
  }
</style>
</head>
